<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - La Fortuna Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="bg-green-700 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold italic">LaFortunaGuide.com</a>
        </div>
    </nav>

    <main class="container mx-auto mt-10 px-4 max-w-2xl">
        <div class="bg-white p-10 rounded-lg shadow-md">
            <h1 class="text-3xl font-bold mb-6 text-gray-900">Contact Us</h1>
            <p class="mb-6 text-gray-600">Have questions about your upcoming trip to La Fortuna? We'd love to help!</p>

            <!-- Formulario de contacto (Visual) -->
            <form action="#" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Name</label>
                    <input type="text" class="w-full p-3 border rounded-lg focus:ring-green-500 focus:border-green-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" class="w-full p-3 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Message</label>
                    <textarea class="w-full p-3 border rounded-lg h-32"></textarea>
                </div>
                <button type="button" class="bg-green-700 text-white px-6 py-3 rounded-lg font-bold hover:bg-green-800 transition">
                    Send Message
                </button>
            </form>

            <div class="mt-8 pt-8 border-t">
                <p class="text-sm text-gray-500 italic">Or email us directly at: <strong>info@lafortunaguide.com</strong></p>
            </div>
        </div>
    </main>

</body>
</html>
